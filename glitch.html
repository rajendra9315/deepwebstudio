<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System</title>

<style>
body{
margin:0;
background:black;
color:#00ff00;
font-family:monospace;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
overflow:hidden;
text-align:center;
transition:0.3s;
}

h1{font-size:6vw;}

button{
padding:12px 25px;
font-size:4vw;
background:black;
color:#00ff00;
border:1px solid #00ff00;
cursor:pointer;
}

#battery{
position:fixed;
top:10px;
right:10px;
color:lime;
font-size:4vw;
}

#notify{
position:fixed;
top:0;
left:0;
width:100%;
background:#111;
color:white;
padding:10px;
display:none;
font-size:4vw;
}

.glitch{animation:flicker 0.08s infinite;}
@keyframes flicker{
0%{opacity:1}
50%{opacity:0.4}
100%{opacity:1}
}

.blood{background:#2b0000 !important;color:red !important;}

.shake{animation:shake 0.1s infinite;}
@keyframes shake{
0%{transform:translate(2px,2px)}
25%{transform:translate(-2px,-2px)}
50%{transform:translate(2px,-2px)}
75%{transform:translate(-2px,2px)}
100%{transform:translate(0,0)}
}
</style>
</head>

<body>

<div id="battery">🔋 100%</div>
<div id="notify">⚠ UNKNOWN DEVICE CONNECTED</div>

<h1 id="title">Tap To Start</h1>
<button id="btn">ENTER</button>

<script>
const title=document.getElementById("title");
const btn=document.getElementById("btn");
const battery=document.getElementById("battery");
const notify=document.getElementById("notify");

let audioStarted=false;

/* ---------- Web Audio Glitch Sound ---------- */
function playGlitch(){
if(audioStarted) return;
audioStarted=true;

const ctx=new (window.AudioContext||window.webkitAudioContext)();
const oscillator=ctx.createOscillator();
const gain=ctx.createGain();

oscillator.type="sawtooth";
oscillator.frequency.setValueAtTime(100,ctx.currentTime);
gain.gain.setValueAtTime(0.1,ctx.currentTime);

oscillator.connect(gain);
gain.connect(ctx.destination);

oscillator.start();
oscillator.frequency.exponentialRampToValueAtTime(1000,ctx.currentTime+1);
gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+1);

oscillator.stop(ctx.currentTime+1);
}

/* ---------- Fullscreen ---------- */
function goFullScreen(){
if(document.documentElement.requestFullscreen){
document.documentElement.requestFullscreen();
}
}

/* ---------- Battery Drain ---------- */
function drainBattery(){
let level=100;
let interval=setInterval(()=>{
level--;
battery.innerText="🔋 "+level+"%";
if(level<=0){
clearInterval(interval);
title.innerText="DEVICE POWER FAILURE";
}
},300);
}

/* ---------- Notifications ---------- */
function showNotification(){
notify.style.display="block";
if(navigator.vibrate){
navigator.vibrate([200,100,200]);
}
setTimeout(()=>notify.style.display="none",3000);
}

/* ---------- Horror Sequence ---------- */
function startHorror(){

goFullScreen();
playGlitch();

title.innerText="UNAUTHORIZED ACCESS";
document.body.classList.add("glitch");

setTimeout(()=>{
showNotification();
},2000);

setTimeout(()=>{
drainBattery();
},4000);

setTimeout(()=>{
document.body.classList.add("blood");
},7000);

setTimeout(()=>{
document.body.classList.add("shake");
title.innerText="YOU CANNOT EXIT";
},10000);

setTimeout(()=>{
document.body.innerHTML="<h1 style='color:red'>SYSTEM OVERRIDDEN</h1>";
},15000);
}

/* ---------- Button Interaction ---------- */
btn.addEventListener("click",()=>{
startHorror();
});

/* Move button */
btn.addEventListener("mouseover",move);
btn.addEventListener("touchstart",move);

function move(){
btn.style.position="absolute";
btn.style.left=Math.random()*(window.innerWidth-100)+"px";
btn.style.top=Math.random()*(window.innerHeight-50)+"px";
}

</script>
</body>
</html>
