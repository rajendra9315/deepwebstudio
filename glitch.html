<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glitch Protocol</title>

<style>
body{
margin:0;
background:black;
color:#00ff00;
font-family:monospace;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
overflow:hidden;
transition:0.2s;
}

h1{font-size:6vw;margin:10px;}

button{
padding:12px 25px;
font-size:4vw;
background:black;
color:#00ff00;
border:1px solid #00ff00;
cursor:pointer;
}

#battery{
position:fixed;
top:10px;
right:10px;
font-size:4vw;
}

#notify{
position:fixed;
top:0;
left:0;
width:100%;
background:#111;
color:white;
padding:10px;
display:none;
}

.glitch{
animation:flicker 0.08s infinite;
}

@keyframes flicker{
0%{opacity:1}
50%{opacity:0.4}
100%{opacity:1}
}

.shake{
animation:shake 0.1s infinite;
}

@keyframes shake{
0%{transform:translate(2px,2px)}
25%{transform:translate(-2px,-2px)}
50%{transform:translate(2px,-2px)}
75%{transform:translate(-2px,2px)}
100%{transform:translate(0,0)}
}

.blood{
background:#2b0000 !important;
color:red !important;
}

.blue{
background:#0000aa !important;
color:white !important;
}

#fingerprint{
display:none;
margin-top:20px;
border:2px solid lime;
padding:15px;
border-radius:50%;
animation:pulse 1s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.1)}
100%{transform:scale(1)}
}
</style>
</head>

<body>

<div id="battery">🔋 100%</div>
<div id="notify">⚠ UNKNOWN DEVICE CONNECTED</div>

<h1 id="title">Tap To Start</h1>
<button id="startBtn">ENTER</button>
<div id="fingerprint">SCAN FINGERPRINT</div>

<script>
const title = document.getElementById("title");
const startBtn = document.getElementById("startBtn");
const battery = document.getElementById("battery");
const notify = document.getElementById("notify");
const fingerprint = document.getElementById("fingerprint");

let batteryLevel = 100;
let audioStarted = false;

/* ----------- SOUND ----------- */
function playGlitchSound(){
if(audioStarted) return;
audioStarted = true;

try{
const ctx = new (window.AudioContext || window.webkitAudioContext)();
const osc = ctx.createOscillator();
const gain = ctx.createGain();
osc.type="square";
osc.frequency.value=120;
gain.gain.value=0.15;
osc.connect(gain);
gain.connect(ctx.destination);
osc.start();
osc.frequency.exponentialRampToValueAtTime(1000, ctx.currentTime+0.5);
osc.stop(ctx.currentTime+0.6);
}catch(e){}
}

/* ----------- START GAME ----------- */
function startGame(){

startBtn.style.display="none";
title.innerText="UNAUTHORIZED ACCESS";
document.body.classList.add("glitch");
playGlitchSound();
drainBattery();
}

/* ----------- FAST BATTERY ----------- */
function drainBattery(){

let interval = setInterval(()=>{

batteryLevel -= 5;
battery.innerText="🔋 "+batteryLevel+"%";

/* Random whispers */
if(Math.random() > 0.6){
let whisper = document.createElement("div");
whisper.innerText = ["behind you","run","don't blink","i see you","too late"][Math.floor(Math.random()*5)];
whisper.style.position="fixed";
whisper.style.left=Math.random()*90+"%";
whisper.style.top=Math.random()*90+"%";
whisper.style.color="red";
whisper.style.fontSize="4vw";
document.body.appendChild(whisper);
setTimeout(()=>whisper.remove(),1200);
}

/* Random red flash */
if(Math.random() > 0.7){
document.body.classList.add("blood");
setTimeout(()=>document.body.classList.remove("blood"),120);
}

/* Timed horror events */

if(batteryLevel === 80){
notify.style.display="block";
if(navigator.vibrate) navigator.vibrate([200,100,200]);
setTimeout(()=>notify.style.display="none",2000);
}

if(batteryLevel === 60){
fingerprint.style.display="block";
}

if(batteryLevel === 40){
document.body.classList.add("shake");
}

if(batteryLevel === 20){
title.innerText="YOU STAYED TOO LONG.";
}

/* End */
if(batteryLevel <= 0){
clearInterval(interval);
finalStage();
}

},150);
}

/* ----------- FINAL STAGE ----------- */
function finalStage(){

// Jump flash
document.body.style.background="white";
setTimeout(()=>{document.body.style.background="black";},150);

document.body.classList.remove("glitch");
document.body.classList.add("blue");

title.innerText="CRITICAL SYSTEM ERROR";

setTimeout(()=>{
let code = prompt("FINAL OVERRIDE CODE (3 seconds):");

if(code === "1234"){
document.body.classList.remove("blue");
document.body.style.background="black";
document.body.style.color="white";
title.innerText="SYSTEM RESTORED";
}else{
title.innerText="DEVICE PERMANENTLY LOCKED";
}

},2000);
}

startBtn.addEventListener("click", startGame);

</script>
</body>
</html>
